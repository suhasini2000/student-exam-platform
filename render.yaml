services:
  - type: web
    name: student-exam-backend
    runtime: python-3.11
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn exam_platform.wsgi"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: student-exam-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: GEMINI_API_KEY
        sync: false # You will need to add this manually in the dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: student-exam-db
    plan: free # This is the free trial tier
