databases:
  - name: student-exam-db
    plan: free
    databaseName: student_exam_db
    user: examuser

services:
  # Django Backend
  - type: web
    name: student-exam-api
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn exam_platform.wsgi:application"
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: student-exam-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://student-exam-app.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.6"

  # React Frontend
  - type: web
    name: student-exam-app
    runtime: static
    plan: free
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: "https://student-exam-api.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
